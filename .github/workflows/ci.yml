name: CI

on:
  push:
    branches: [main, master, nowires-rust]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust lint/check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libclang-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        working-directory: apps/api-rs
        run: cargo fmt --check
      - name: Clippy
        working-directory: apps/api-rs
        run: cargo clippy --all-targets -- -D warnings

  rust-build:
    name: Rust build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libclang-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        working-directory: apps/api-rs
        run: cargo build --release

  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libclang-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Test
        working-directory: apps/api-rs
        run: cargo test

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust audit
        working-directory: apps/api-rs
        run: cargo install cargo-audit && cargo audit --deny warnings --ignore RUSTSEC-2024-0436
      - name: Node audit
        run: npm audit --audit-level=moderate

  dependency-check:
    name: Dependency updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check outdated Rust deps
        working-directory: apps/api-rs
        run: cargo install cargo-outdated && cargo outdated --exit-code 1 || true
      - name: Check outdated npm deps
        run: npm outdated || true

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: rust-check
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libclang-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run coverage
        working-directory: apps/api-rs
        run: cargo tarpaulin --out html --ignore-tests
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api-rs/htmlcov/
          retention-days: 7

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm --workspace apps/web run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm --workspace apps/web run typecheck

  web-build:
    name: Next.js build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [eslint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build:web

  vitest:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [eslint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm --workspace apps/web run test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [web-build, vitest, rust-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libclang-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install npm deps
        run: npm ci
      - name: Build web
        run: npm run build:web
      - name: Build Rust API
        run: cargo build --release --manifest-path apps/api-rs/Cargo.toml
      - name: Start Rust API server
        run: |
          cargo run --release --manifest-path apps/api-rs/Cargo.toml &
          sleep 10
        working-directory: apps/api-rs
      - name: Install Playwright
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Start frontend
        run: npx next start apps/web -p 3000 &
      - name: Wait for frontend
        run: npx wait-on http://localhost:3000 --timeout 30000
      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
      - name: Cleanup
        if: always()
        run: |
          pkill -f "next start" || true
          pkill -f "nowires-api" || true

  e2e-firefox:
    name: Playwright E2E (Firefox)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [web-build, vitest, rust-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libclang-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install npm deps
        run: npm ci
      - name: Build web
        run: npm run build:web
      - name: Build Rust API
        run: cargo build --release --manifest-path apps/api-rs/Cargo.toml
      - name: Start Rust API server
        run: |
          cargo run --release --manifest-path apps/api-rs/Cargo.toml &
          sleep 10
        working-directory: apps/api-rs
      - name: Install Playwright
        working-directory: apps/web
        run: npx playwright install --with-deps firefox
      - name: Start frontend
        run: npx next start apps/web -p 3000 &
      - name: Wait for frontend
        run: npx wait-on http://localhost:3000 --timeout 30000
      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_BROWSERS_CHANNEL: firefox
      - name: Cleanup
        if: always()
        run: |
          pkill -f "next start" || true
          pkill -f "nowires-api" || true